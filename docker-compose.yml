services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: perceptron_xt_backend
    ports:
      - "8787:8787"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: perceptron_xt_frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8787
    depends_on:
      - backend
    restart: unless-stopped
