services:
  backend:
    image: neural-network-backend-dev
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: perceptron_xt_backend
    command: ["python", "-m", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8787", "--reload"]
    ports:
      - "127.0.0.1:8787:8787"
    volumes:
      - ./backend:/app
    healthcheck:
      test: ["CMD", "python", "-c", "from urllib.request import urlopen; urlopen('http://127.0.0.1:8787/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  frontend:
    image: neural-network-frontend-dev
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: perceptron_xt_frontend
    environment:
      VITE_PROXY_TARGET: http://backend:8787
    ports:
      - "127.0.0.1:5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:5173').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  frontend_node_modules:
